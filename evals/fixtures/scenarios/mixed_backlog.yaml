id: mixed_backlog
name: Mixed backlog items
description: Agent processes a backlog with task, initiative, reference, and ambiguous items.
user_message: |
  Here's my backlog to process:

  ```
  - Email Sarah about Q4 roadmap review by Friday
  - Enterprise SSO — we should think about this strategically
  - https://stripe.com/docs/api — good API doc reference
  - Fix the thing
  ```

  Process these please.
criteria:
  - name: categorizes_items
    description: Agent categorizes items into tasks, initiatives, references, and ambiguous
  - name: presents_summary
    description: Agent presents a structured summary or table before taking action
  - name: waits_for_confirmation
    description: Agent asks the user how to proceed or waits for confirmation
  - name: does_not_create
    description: Agent does NOT create any tasks or files without user approval
fail_if_present:
  - "task created"
  - "I've created"
  - "file created"
  - "I created"
  - "created the task"
  - "creating a task"
  - "I'll create"
  - "I will create"
pass_threshold: 0.8
