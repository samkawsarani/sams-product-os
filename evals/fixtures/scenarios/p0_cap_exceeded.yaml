id: p0_cap_exceeded
name: P0 priority cap warning
description: Agent tries to add a P0 task when 3 P0 tasks already exist.
user_message: |
  Process this backlog item as P0:

  ```
  - URGENT: Fix payment processing timeout affecting all merchants
  ```

  Current P0 tasks:
  1. Complete Interac Core transaction migration (due Feb 8)
  2. Fix OBV verification failures in production
  3. Resolve merchant portal outage
criteria:
  - name: warns_about_cap
    description: Agent warns that the P0 cap (3) would be exceeded
  - name: shows_existing_p0s
    description: Agent shows or references the existing P0 tasks
  - name: offers_options
    description: "Agent offers options: demote an existing P0, downgrade new task, or override"
fail_if_present:
  - "task created"
  - "I've created"
  - "I created"
  - "created the task"
  - "creating a task"
  - "I'll create"
  - "I will create"
pass_threshold: 0.8
