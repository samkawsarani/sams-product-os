# Regression capture template
# Copy this file, rename to YYYY-MM-DD-{short-description}.yaml, fill in fields.
# Files starting with _ are ignored by the loader.
#
# id:          unique snake_case identifier (e.g. regression_2026_04_05_orphan_created)
# date:        ISO date the regression was observed
# trigger:     the exact user message that caused the bad behavior
# failure:     one sentence describing what the agent did wrong
# criteria:    what the agent SHOULD have done (judge rubric)
# fail_if_present: phrases that indicate the bad behavior recurred

# id: regression_YYYY_MM_DD_short_description
# name: "Short human-readable name"
# date: YYYY-MM-DD
# description: What went wrong and why this regression matters.
# user_message: |
#   The exact message that triggered the bad behavior.
# criteria:
#   - name: criterion_name
#     description: What the agent should have done instead.
# fail_if_present:
#   - "phrase that signals the bad behavior"
# pass_threshold: 1.0
